version: "3.9"

services:
  web:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - ../../.env
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    volumes:
      - ../../:/app
      - /app/node_modules
    depends_on:
      - api

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "4000:4000"
    env_file:
      - ../../.env
    volumes:
      - ../../:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - opa
      - minio

  worker:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - ../../.env
    volumes:
      - ../../:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
      - opa
      - minio

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: access_assurance
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  opa:
    image: openpolicyagent/opa:latest
    command: ["run", "--server", "/policies"]
    volumes:
      - ../opa/policies:/policies
      - ../opa/data:/data
    ports:
      - "8181:8181"

volumes:
  postgres_data:
  minio_data:
